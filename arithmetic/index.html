<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMV | Arithmetic Trainer</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="trainer.css">
    <link rel="icon" type="image/x-icon" href="../IMVyt.ico">
</head>
<body>

    <div id="settings-view" class="trainer-page trainer-dock">
        <h1 class="trainer-title">Arithmetic Trainer</h1>
        <p class="trainer-description">
            Arithmetic practice.
        </p>

        <div class="settings-grid">
            <div class="option">
                <input type="checkbox" id="add" checked>
                <label for="add"><strong>Addition</strong></label>
                <div class="range-text">
                    Range: (<input type="number" id="add-min1" value="2" min="1"> to <input type="number" id="add-max1" value="100" min="1">) + (<input type="number" id="add-min2" value="2" min="1"> to <input type="number" id="add-max2" value="100" min="1">)
                </div>
            </div>
            <div class="option">
                <input type="checkbox" id="sub" checked>
                <label for="sub"><strong>Subtraction</strong></label>
                <div class="range-text">Addition problems in reverse.</div>
            </div>
            <div class="option">
                <input type="checkbox" id="mult" checked>
                <label for="mult"><strong>Multiplication</strong></label>
                <div class="range-text">
                    Range: (<input type="number" id="mult-min1" value="2" min="1"> to <input type="number" id="mult-max1" value="12" min="1">) &times; (<input type="number" id="mult-min2" value="2" min="1"> to <input type="number" id="mult-max2" value="100" min="1">)
                </div>
            </div>
            <div class="option">
                <input type="checkbox" id="div" checked>
                <label for="div"><strong>Division</strong></label>
                <div class="range-text">Multiplication problems in reverse.</div>
            </div>
        </div>

        <div class="settings-footer">
            <div class="duration-control">
                <label for="duration">Duration:</label>
                <select id="duration">
                    <option value="30">30 seconds</option>
                    <option value="60">60 seconds</option>
                    <option value="120" selected>120 seconds</option>
                    <option value="300">300 seconds</option>
                    <option value="600">600 seconds</option>
                </select>
            </div>
            <button id="start-btn" class="btn-primary" type="button">Start</button>
        </div>

        <div id="settings-error" class="settings-error hidden"></div>

        <p class="home-link"><a href="../index.html">Return to Home</a></p>
    </div>

    <div id="game-view" class="hidden game-page">
        <div class="stats-bar">
            <div id="timer">Seconds left: 120</div>
            <div id="score">Score: 0</div>
        </div>

        <div class="game-dock-wrapper">
            <div class="game-dock">
                <div class="problem-container">
                    <span id="problem-text"></span>
                    <input type="number" id="answer-input" autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <div id="recap-view" class="hidden trainer-page trainer-dock">
        <h1 class="trainer-title">Time's Up!</h1>
        <div class="final-score">Final Score: <span id="final-score-val">0</span></div>
        <button id="try-again-btn" class="btn-primary" type="button">Try Again</button>
    </div>

    <script src="trainer.js"></script>
</body>
</html>
